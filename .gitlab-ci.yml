stages:
  - uv-install
  # - pre-commit
  - test
  - docs

variables:
  PYTHON_VERSION: "3.11"
  PANDOC_VERSION: "2.12"
  BASE_LAYER: bookworm
  UV_VERSION: "latest"
  ARTIFACTS_TEST_PATH: "junit/test-results.xml"
  ARTIFACTS_COV_PATH: "coverage/"
  COVERAGE_XML_PATH: coverage.xml
  UV_CACHE_DIR: .uv-cache
  # GitLab CI creates a separate mountpoint for the build directory,
  # so we need to copy instead of using hard links.
  UV_LINK_MODE: copy

default:
  image: ghcr.io/astral-sh/uv:python$PYTHON_VERSION-$BASE_LAYER

# Persisting the uv cache between workflow runs can improve performance
uv-install:
  stage: uv-install
  only:
    - merge_requests
    - main
  cache:
    - key:
        files:
          - uv.lock
      paths:
        - $UV_CACHE_DIR
  script:
    - uv sync --group test --cache-dir $UV_CACHE_DIR --locked
    # Reduce cache size
    - uv cache prune --ci

# pre-commit:
#   stage: pre-commit
#   needs: [uv-install]
#   script:
#     - uv run pre-commit run --all-files

test:
  stage: test
  only:
    - merge_requests
    - main
  needs: [uv-install]
  script:
    - echo "Running tests"
    - uv run pytest -v --cov src --junitxml=$ARTIFACTS_TEST_PATH --cov-report=xml --cov-report=html --cov-report=term -n auto tests
    - mv htmlcov $ARTIFACTS_COV_PATH
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      junit: $ARTIFACTS_TEST_PATH
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - junit/test-results.xml
      - coverage/
    expose_as: 'test result and coverage'

docs:
  stage: docs
  only:
    - merge_requests
    - main
  needs: [uv-install]
  script:
    - pip3 install -r docs/requirements.txt
    - wget -P pandoc/ https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-linux-amd64.tar.gz
    - tar -xvzf pandoc/*tar.gz -C pandoc/
    - export PATH=$(pwd)/pandoc/pandoc-${PANDOC_VERSION}/bin:${PATH}
    - sphinx-build docs/ docs-build/
  artifacts:
    paths:
      - docs-build/
    expire_in: 1 week
    expose_as: 'sphinx documentation'
    when: on_success
